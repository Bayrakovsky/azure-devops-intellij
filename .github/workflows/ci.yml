name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin (includes Checkstyle)
        run: ./gradlew :plugin:buildPlugin :plugin:checkstyleMain

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugin/build/distributions/*.zip
          if-no-files-found: error
